syntax = "proto3";

package presidio;

option go_package = "github.com/mxab/otel-presidio/presidioprocessor/client;client";

service AnonymizerService {
  rpc AnonymizeBatch (BatchRequest) returns (BatchResponse);
}

message BatchRequest {
  repeated string texts = 1;
  string language = 2;
}

message BatchResponse {
  repeated string anonymized_texts = 1;
}